name: gongfa-staging

services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: gongfa-web-staging:latest
    container_name: gongfa-web-staging
    restart: unless-stopped
    env_file:
      - ../.env.staging
    ports:
      - "8081:8090"
    volumes:
      - ../backend/dev-data.staging.json:/app/backend/dev-data.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
