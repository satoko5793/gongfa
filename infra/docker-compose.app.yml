version: "3.9"

services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: gongfa-web:latest
    container_name: gongfa-web
    restart: unless-stopped
    env_file:
      - ../.env.production
    ports:
      - "80:8090"
    volumes:
      - ../backend/dev-data.json:/app/backend/dev-data.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
