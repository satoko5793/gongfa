name: gongfa-prod

services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    image: gongfa-web:latest
    container_name: gongfa-web
    restart: unless-stopped
    env_file:
      - ../.env.production
    expose:
      - "8090"
    volumes:
      - ../backend/dev-data.json:/app/backend/dev-data.json
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: gongfa-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
